name: Deploy Production Registry

on:
  push:
    branches:
      - main

permissions:
  actions: read
  deployments: write
  contents: write

concurrency:
  group: "production-registry-deploy"
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.repository_owner != 'getarcaneapp' }}
    runs-on: macos-latest
    environment:
      name: production
      url: https://registry.mifi.xyz
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # token: ${{ secrets.ARCANE_BOT_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "guigeng"
          git config --global user.email "guigeng.ding@gmail.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Validate templates
        run: pnpm run lint

      - name: Generate registry.json
        env:
          REGISTRY_NAME: Arcane Community Templates
          REGISTRY_DESCRIPTION: Community Docker Compose Templates for Arcane
          REGISTRY_AUTHOR: guigeng
          REGISTRY_URL: "https://github.com/guigeng/arcane-templates"
          PUBLIC_BASE: "https://registry.mifi.xyz/templates"
          DOCS_BASE: "https://github.com/guigeng/arcane-templates/tree/main/templates"
          BUMP_PART: minor
          SCHEMA_URL: "https://registry.getarcane.app/schema.json"
        run: pnpm run generate

      - name: Commit registry.json
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          repository: "."
          branch: ""
          commit_message: "chore: update registry.json [skip ci]"
          commit_user_name: guigeng
          commit_user_email: guigeng.ding@gmail.com
          commit_author: "guigeng <guigeng.ding@gmail.com>"
          commit_options: ""
          file_pattern: "registry.json"
          add_options: ""
          tag_name: ""
          tagging_message: ""
          status_options: "--porcelain"
          push_options: ""
          skip_dirty_check: false
          skip_fetch: false
          skip_checkout: false
          skip_push: false
          disable_globbing: false
          create_branch: false
          create_git_tag_only: false

      - name: Stage build directory
        run: pnpm run stage

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy
